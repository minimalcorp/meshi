services:
  meshi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: meshi:local
    container_name: meshi
    ports:
      - '5250:5250' # web
      - '5251:5251' # server
    volumes:
      # 本番稼働想定: ホストの ~/.meshi に永続化（bind mount）
      - ${HOME}/.meshi:/data
    restart: unless-stopped
